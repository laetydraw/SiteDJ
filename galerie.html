<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie | Vaward</title>
  <meta name="description" content="Galerie photo des ambiances et événements de Vaward." />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://tonpseudo.github.io/Vaward/galerie.html" />
  <link rel="stylesheet" href="style.css?version=1.2.2" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">
  <img src="images/LogoVaward.png" alt="Vaward DJ" />
</a>

      <button class="burger" id="burger" aria-label="Ouvrir le menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav" id="nav">
        <a href="index.html">Accueil</a>
        <a href="prestations.html">Prestations</a>
        <a href="agenda.html">Agenda</a>
        <a href="reservation.html">Réservation</a>
        <a href="avis.html">Avis</a>
        <a href="galerie.html" class="active">Galerie</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero">
      <div class="container">
        <p class="section-tag">Galerie</p>
        <h1>L’univers Vaward en images</h1>
      </div>
    </section>

    <section class="section">
      <div class="container gallery-grid">
        <img src="images/gallery-1.jpg" alt="Soirée DJ Vaward 1" class="gallery-item" />
        <img src="images/gallery-2.jpg" alt="Soirée DJ Vaward 2" class="gallery-item" />
        <img src="images/gallery-3.jpg" alt="Soirée DJ Vaward 3" class="gallery-item" />
        <img src="images/gallery-4.jpg" alt="Soirée DJ Vaward 4" class="gallery-item" />
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <p>© 2026 Vaward — Tous droits réservés.</p>
    </div>
  </footer>

  <script src="script.js?version=1.2.2"></script>

  <!-- ==================== FEEDBACK DJ ==================== -->
<button id="dj-feedback-trigger" class="dj-feedback-trigger">
    🕺 Me soutenir
</button>

<div id="dj-feedback-modal" class="dj-feedback-modal">
    <div class="dj-feedback-backdrop" data-close-dj></div>

    <div class="dj-feedback-panel">
        <button class="dj-feedback-close" data-close-dj>×</button>

        <h2>Ton avis sur l’ambiance ?</h2>
        <p class="dj-subtitle">
            Une vibe, un ressenti, un moment marquant… tout est bienvenu 🎧
        </p>

        <form id="dj-feedback-form">

            <div class="dj-reactions">
    <label class="dj-reaction">
        <input type="radio" name="reaction" value="🔥" checked>
        <span>🔥</span>
    </label>

    <label class="dj-reaction">
        <input type="radio" name="reaction" value="🎧">
        <span>🎧</span>
    </label>

    <label class="dj-reaction">
        <input type="radio" name="reaction" value="💃">
        <span>💃</span>
    </label>

    <label class="dj-reaction">
        <input type="radio" name="reaction" value="🚀">
        <span>🚀</span>
    </label>

    <label class="dj-reaction">
        <input type="radio" name="reaction" value="👏">
        <span>👏</span>
    </label>
</div>

            <input type="text" id="dj-name" placeholder="Ton prénom (optionnel)">

            <label class="dj-anonymous" for="dj-anonymous">
    <input type="checkbox" id="dj-anonymous">
    <span>Anonyme</span>
</label>

            <textarea id="dj-message" rows="4" maxlength="400" placeholder="🪩 Tu as kiffé ta soirée ? Une émotion ressentie ? ou une idée d’amélioration du site ?">
</textarea>

            <p id="dj-error" class="dj-error"></p>

            <button type="submit" id="dj-submit">
                Envoyer
            </button>

        </form>
    </div>
</div>

<div id="dj-toast" class="dj-toast">
    <div class="dj-toast-content">
        🔥 Merci pour ton retour !
    </div>
</div>

</body>
</html>
